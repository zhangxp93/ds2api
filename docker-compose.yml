# 使用命令如下
# docker-compose down
# docker-compose up -d

services:
  ds2api:
    build: .
    container_name: ds2api
    restart: always
    ports:
      - "6011:5001"
    volumes:
      # 1. 确保左边是宿主机的真实文件路径
      # 2. 确保右边是容器内程序寻找的绝对路径
      - ./config.json:/app/config.json
    environment:
      # 显式指定路径，消除程序猜测路径的歧义
      - DS2API_CONFIG_PATH=/app/config.json
      # 顺便把这个警告消掉，设置你的后台管理密码
      - DS2API_ADMIN_KEY=your_secure_password
    # 如果 .env 文件里有配置，也可以保留
    env_file:
      - .env